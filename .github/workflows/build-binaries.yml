name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.12.0)'
        required: true
        type: string
      source_ref:
        description: 'Source ref to build/publish (defaults to tag; use only for release recovery)'
        required: false
        type: string

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      SOURCE_REF: ${{ github.event.inputs.source_ref || github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Rename artifacts to mindpi-*
        run: |
          cd packages/coding-agent/binaries
          for f in pi-*.tar.gz pi-*.zip; do
            [ -f "$f" ] && mv "$f" "mind${f}"
          done

      - name: Extract changelog for this version
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/release-notes.mjs extract --version "${VERSION}" --tag "${RELEASE_TAG}" --out /tmp/release-notes.md || echo "MindPi ${RELEASE_TAG}" > /tmp/release-notes.md

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/coding-agent/binaries
          ARTIFACTS="mindpi-darwin-arm64.tar.gz mindpi-darwin-x64.tar.gz mindpi-linux-x64.tar.gz mindpi-linux-arm64.tar.gz mindpi-windows-x64.zip mindpi-windows-arm64.zip"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --title "MindPi ${RELEASE_TAG}" --notes-file /tmp/release-notes.md
            gh release upload "${RELEASE_TAG}" $ARTIFACTS --clobber
          else
            gh release create "${RELEASE_TAG}" --title "MindPi ${RELEASE_TAG}" --notes-file /tmp/release-notes.md $ARTIFACTS
          fi
